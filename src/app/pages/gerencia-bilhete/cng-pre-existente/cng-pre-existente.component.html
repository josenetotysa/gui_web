<div class="conteiner">
    <h1 class="center">CNG Pré Existente</h1>

    <section class="filter">
      <div class="filter-top" (click)="toggleAccordion()">
        <div>
          <img src="assets/svg/filter_icon.svg">
          <span>Filtros</span>
        </div>
        <img src="assets/svg/keyboard_arrow_down_30dp_101828.svg"
             class="accordion-arrow"
             [class]="{'close-accordion': !isFilterOpen}">
      </div>

      @if(isFilterOpen) {
        <div style="margin: 16px 0 0 16px;">
            <p style="font-weight: bold;">Bilhete de Portabilidade</p>
            <form name="formBilhetePortabilidade" class="form-filters" [formGroup]="filterForm" (ngSubmit)="filterTable()">
              <div class="form-filters-all-inputs">
                <div class="form-filters-inputgroup">
                  <label for="cn">CN</label>
                  <input type="text" name="CN" id="cn" class="filter-input" formControlName="CN" mask="(00)"
                  [style]="filterForm.controls['CN'].touched && filterForm.controls['CN'].invalid ? 'border-color: red;' : ''">
                </div>

                <div class="form-filters-inputgroup">
                  <label for="numero">Número</label>
                  <input type="text" name="Número" id="numero" class="filter-input" formControlName="number" mask="0000"
                  [style]="filterForm.controls['number'].touched && filterForm.controls['number'].invalid ? 'border-color: red;' : ''">
                </div>

                <div class="form-filters-inputgroup">
                  <label for="mcdu">MCDU</label>
                  <input type="text" name="MCDU" id="mcdu" class="filter-input" formControlName="MCDU" mask="0000"
                  [style]="filterForm.controls['MCDU'].touched && filterForm.controls['MCDU'].invalid ? 'border-color: red;' : ''">
                </div>
              </div>
              <div class="filter-btns-group">
                <button type="button" class="filter-btn filter-btn-secondary" (click)="resetFilter()">LIMPAR FILTRO</button>
                <button type="submit" class="filter-btn filter-btn-primary">PESQUISAR</button>
              </div>
            </form>
        </div>
      }
    </section>


    <section class="table">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
          <ng-container matColumnDef="phoneNumber">
            <th mat-header-cell *matHeaderCellDef class="table-column-name"> Número de Telefone </th>
            <td mat-cell *matCellDef="let element"> {{element.phoneNumber | mask:'(00) 0000-0000'}} </td>
          </ng-container>

          <ng-container matColumnDef="providerId">
            <th mat-header-cell *matHeaderCellDef class="table-column-name"> ID de Prestadora </th>
            <td mat-cell *matCellDef="let element"> {{element.providerId}} </td>
          </ng-container>

          <ng-container matColumnDef="total-registry">
            <td mat-footer-cell *matFooterCellDef colspan="2">
              Total de Registros: {{ dataSource.length }}
            </td>
          </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        <tr class="mat-row" *matNoDataRow>
          <div class="no-registry-msg"><span>Nenhum registro encontrado.</span></div>
        </tr>
        <tr mat-footer-row *matFooterRowDef="['total-registry']"></tr>

      </table>
    </section>
</div>
