<div class="conteiner">
  <h1 class="center">Janela de Broadcast Bloqueada</h1>

  <section class="table">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef class="table-column-name"> Data </th>
          <td mat-cell *matCellDef="let element"> {{element.date | date: 'dd/MM/yyyy'}} </td>
        </ng-container>

        <ng-container matColumnDef="dayWeek">
          <th mat-header-cell *matHeaderCellDef class="table-column-name"> Dias da Semana </th>
          <td mat-cell *matCellDef="let element" style="text-transform: capitalize;"> {{element.dayWeek}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="table-column-name"> Ações </th>
          <td mat-cell *matCellDef="let element"> {{ element.actions }} </td>
        </ng-container>

        <ng-container matColumnDef="total-registry">
          <td mat-footer-cell *matFooterCellDef colspan="3">
            Total de Registros: {{ dataSource.length }}
          </td>
        </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      <tr class="mat-row" *matNoDataRow>
        <div class="no-registry-msg"><span>Nenhum registro encontrado.</span></div>
      </tr>
      <tr mat-footer-row *matFooterRowDef="['total-registry']"></tr>

    </table>
  </section>
</div>
